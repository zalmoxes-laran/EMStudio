<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMStudio</title>
  </head>
  <body>
    <header id="toolbar">
      <span id="brand">EMStudio</span>
      <span id="em-version" title="EM language version (from the s3Dgraphy datamodels)"></span>
      <button id="btn-open" title="Open an .em.json file">Open…</button>
      <button id="btn-save" title="Save .em.json (⌘S)">Save</button>
      <button id="btn-save-as" title="Save .em.json to a new file (⇧⌘S)">Save As…</button>
      <button id="btn-svg" title="Export current view as SVG">SVG</button>
      <button id="btn-graphml" title="Export as yEd GraphML (needs the local dev bridge — see dev.sh)">GraphML</button>
      <button id="btn-sync" title="Connect to Blender/EMtools for live selection sync (ADR-002)">Sync</button>
      <span id="dirty-dot" class="hidden" title="unsaved changes">●</span>
      <span class="tb-sep"></span>
      <button id="btn-undo" title="Undo (⌘Z)" disabled>↺</button>
      <button id="btn-redo" title="Redo (⇧⌘Z)" disabled>↻</button>
      <span class="tb-sep"></span>
      <div id="view-toggle" role="group">
        <button id="btn-matrix" class="active">Matrix</button>
        <button id="btn-graph">Graph</button>
      </div>
      <select id="edge-filter" title="Edge visibility">
        <option value="all">All edges</option>
        <option value="sequence">Stratigraphic only</option>
        <option value="none">No edges</option>
      </select>
      <button id="btn-filters" title="Filter node and edge types (graph view)">Filters</button>
      <button id="btn-fit" title="Fit to view (0)">Fit</button>
      <button id="btn-layout" title="Recompute the swimlane layout (em-core, same engine as the CLI)">Layout</button>
      <input type="file" id="file-input" accept=".json,.em.json" hidden />
      <div id="search-wrap">
        <input id="search" type="search" placeholder="Search nodes…" autocomplete="off" />
        <div id="search-results" class="hidden"></div>
      </div>
    </header>
    <main>
      <aside id="palette" title="Click a type, then click the canvas to place it"></aside>
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div id="drop-hint">Drop an <b>.em.json</b> file here</div>
        <div id="hint-bar" class="hidden"></div>
        <div id="legend" class="hidden"></div>
        <div id="edge-menu" class="hidden"></div>
        <div id="filter-panel" class="hidden"></div>
        <div id="toast" class="hidden"></div>
        <canvas id="overview" title="Overview — click to move the viewport"></canvas>
      </div>
      <aside id="side" class="hidden">
        <div id="side-tabs">
          <button id="tab-inspector" class="active">Inspector</button>
          <button id="tab-nodes">Nodes</button>
        </div>
        <div id="inspector"></div>
        <div id="nodelist" class="hidden"></div>
      </aside>
    </main>
    <footer id="statusbar">
      <div id="breadcrumb" class="hidden"></div>
      <span id="info">open or drop an .em.json file</span>
    </footer>
    <div id="tooltip" class="hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
