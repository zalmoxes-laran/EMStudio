  <body>
    <header id="toolbar">
      <span id="brand">EMStudio</span>
      <button id="em-version" title="Version breakdown (config files + CIDOC-CRM)"></button>
      <div class="dropdown" id="dd-file">
        <button class="dd-toggle" title="File operations">File ▾</button>
        <div class="dd-menu hidden">
          <button id="btn-new" title="New empty .em.json">New</button>
          <button id="btn-open" title="Open an .em.json file">Open…</button>
          <button
            id="btn-import-graphml"
            title="Import a yEd GraphML file (needs the local dev bridge — see dev.sh)"
          >
            Import GraphML…
          </button>
          <button id="btn-save" title="Save .em.json (⌘S)">Save</button>
          <button id="btn-save-as" title="Save .em.json to a new file (⇧⌘S)">Save As…</button>
        </div>
      </div>
      <div class="dropdown" id="dd-export">
        <button class="dd-toggle" title="Export">Export ▾</button>
        <div class="dd-menu hidden">
          <button id="btn-svg" title="Export current view as SVG">SVG</button>
          <button id="btn-graphml" title="Export as yEd GraphML (needs the local dev bridge — see dev.sh)">GraphML</button>
        </div>
      </div>
      <button id="btn-sync" title="Connect to Blender/EMtools for live selection sync (ADR-002)">Sync</button>
      <button id="btn-settings" title="Settings (sync target, …)" aria-label="Settings">⚙</button>
      <span id="dirty-dot" class="hidden" title="unsaved changes">●</span>
      <span class="tb-sep"></span>
      <button id="btn-undo" title="Undo (⌘Z)" disabled>↺</button>
      <button id="btn-redo" title="Redo (⇧⌘Z)" disabled>↻</button>
      <span class="tb-sep"></span>
      <div id="view-toggle" role="group">
        <button id="btn-matrix" class="active">Matrix</button>
        <button id="btn-graph">Graph</button>
      </div>
      <select id="edge-filter" title="Edge visibility">
        <option value="all">All edges</option>
        <option value="sequence">Stratigraphic only</option>
        <option value="none">No edges</option>
      </select>
      <button id="btn-filters" title="Detail level — show/hide rings of nodes & edges (per view)">Detail</button>
      <select
        id="graph-layout"
        title="Graph-view layout algorithm (Graph view only)"
        style="display: none"
      >
        <option value="layered">Layered</option>
        <option value="radial">Radial</option>
        <option value="force">Force</option>
      </select>
      <button id="btn-fit" title="Fit to view (0)">Fit</button>
      <button id="btn-layout" title="Recompute the swimlane layout (em-core, same engine as the CLI)">Layout</button>
      <input type="file" id="file-input" accept=".json,.em.json" hidden />
      <div id="search-wrap">
        <input id="search" type="search" placeholder="Search nodes…" autocomplete="off" />
        <div id="search-results" class="hidden"></div>
      </div>
    </header>
    <main>
      <aside id="palette" title="Click a type, then click the canvas to place it"></aside>
      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div id="drop-hint">Drop an <b>.em.json</b> file here</div>
        <div id="hint-bar" class="hidden"></div>
        <div id="legend" class="hidden"></div>
        <div id="edge-menu" class="hidden"></div>
        <div id="filter-panel" class="hidden"></div>
        <div id="toast" class="hidden"></div>
        <canvas id="overview" title="Overview — click to move the viewport"></canvas>
      </div>
      <aside id="side" class="hidden">
        <div id="side-tabs">
          <button id="tab-inspector" class="active">Inspector</button>
          <button id="tab-nodes">Nodes</button>
        </div>
        <div id="inspector"></div>
        <div id="nodelist" class="hidden"></div>
      </aside>
    </main>
    <footer id="statusbar">

             stays legible on both the light footer and the dark sync footer. -->

          </g>
        </svg>
        <b>Extended Matrix</b>
      </span>
      <div id="breadcrumb" class="hidden"></div>
      <span id="info">open or drop an .em.json file</span>
    </footer>
    <div id="tooltip" class="hidden"></div>
    <div id="settings-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <span>Settings</span>
          <button id="settings-close" class="modal-x" title="Close">✕</button>
        </div>
        <div class="modal-body">
          <section class="settings-sect">
            <h4>Live sync</h4>
            <p class="settings-hint">
              Where EMStudio connects for live sync (ADR-002). The chosen tool
              is the <b>host</b> and runs the WebSocket server; EMStudio is the
              client.
            </p>
            <label
              >Sync with
              <select id="set-sync-tool"></select>
            </label>
            <label
              >Protocol
              <select id="set-sync-protocol">
                <option value="ws">ws:// (local)</option>
                <option value="wss">wss:// (secure)</option>
              </select>
            </label>
            <label
              >Host / IP
              <input id="set-sync-host" type="text" placeholder="localhost" />
            </label>
            <label
              >Port
              <input
                id="set-sync-port"
                type="number"
                min="1"
                max="65535"
                placeholder="8788"
              />
            </label>
            <p class="settings-url">
              Endpoint: <code id="set-sync-url"></code>
            </p>
          </section>
          <section class="settings-sect">
            <h4>Developer</h4>
            <label class="settings-check">
              <input id="set-dev-uuid" type="checkbox" />
              Show node UUIDs (inspector) — off by default
            </label>
          </section>
        </div>
        <div class="modal-foot">
          <button id="settings-cancel">Cancel</button>
          <button id="settings-save" class="primary">Save</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
